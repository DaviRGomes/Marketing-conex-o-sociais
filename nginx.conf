server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Assets estáticos com cache longo
    location /cursorelatorios/assets/ {
    alias /usr/share/nginx/html/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    }

    # SPA fallback: qualquer rota desconhecida serve o index.html
    location /cursorelatorios {
        try_files $uri $uri/ /index.html;
    }

    # Raiz redireciona para /cursorelatorios
    location = / {
        return 301 /cursorelatorios;
    }
}
